server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket signaling/relay -> the "server" service on the compose network.
    # This keeps everything on one origin so Dokploy's proxy/TLS just works.
    location /ws {
        proxy_pass http://server:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback: every other route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
